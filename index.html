<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Mama Gio</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 15px; background-color: #f4f7f6; }
        .container { max-width: 1000px; margin: auto; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        
        .card-container { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex: 1; min-width: 250px; text-align: center; }
        .card h3 { margin: 0; color: #666; font-size: 16px; }
        .card p { font-size: 24px; font-weight: bold; margin: 10px 0 0; color: #2c3e50; }
        
        .chart-box { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        .table-container { background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #ff9800; color: white; }
        
        @media (max-width: 600px) {
            body { padding: 10px; }
            .card { min-width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 Dashboard Monitor Mama Gio</h2>

    <div class="card-container">
        <div class="card">
            <h3>Total Pemasukan</h3>
            <p id="totalPemasukan">Rp 0</p>
        </div>
        <div class="card">
            <h3>Jumlah Pesanan</h3>
            <p id="totalPesanan">0</p>
        </div>
    </div>

    <div class="chart-box">
        <canvas id="myChart"></canvas>
    </div>

    <div class="table-container">
        <h3>Riwayat Pesanan Terbaru</h3>
        <table>
            <thead>
                <tr>
                    <th>Waktu</th>
                    <th>Pesanan</th>
                    <th>Nama Pelanggan</th>
                    <th>Total Harga</th>
                </tr>
            </thead>
            <tbody id="dataBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    // PENTING: GANTI DENGAN URL GOOGLE SCRIPT KAMU SENDIRI!
    const SCRIPT_URL = 'GANTI_DENGAN_URL_WEB_APP_KAMU';

    async function fetchData() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            
            // 1. Update Tabel
            let tableHTML = '';
            let totalDuit = 0;
            data.slice().reverse().forEach(row => {
                tableHTML += `<tr>
                    <td>${row.timestamp}</td>
                    <td>${row.pesanan}</td>
                    <td>${row.nama}</td>
                    <td>Rp ${row.harga.toLocaleString()}</td>
                </tr>`;
                totalDuit += row.harga;
            });
            document.getElementById('dataBody').innerHTML = tableHTML;
            document.getElementById('totalPemasukan').innerText = 'Rp ' + totalDuit.toLocaleString();
            document.getElementById('totalPesanan').innerText = data.length;

            // 2. Update Grafik
            const ctx = document.getElementById('myChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(item => item.timestamp.split(' ')[0]), // Ambil tgl aja
                    datasets: [{
                        label: 'Pemasukan (Rp)',
                        data: data.map(item => item.harga),
                        backgroundColor: '#ff9800',
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } }
                }
            });

        } catch (error) {
            console.error('Gagal ambil data:', error);
            document.getElementById('dataBody').innerHTML = '<tr><td colspan="4">Gagal memuat data. Cek SCRIPT_URL.</td></tr>';
        }
    }

    fetchData();
</script>

</body>
</html>
